<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Coin Tap</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.7);
      --accent: #f59e0b;
      --accent2: #fbbf24;
      --green: #22c55e;
      --blue: #3b82f6;
      --nav: rgba(15, 23, 42, 0.96);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1e293b 0%, #0f172a 45%, #020617 100%);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100%;
      max-width: 430px;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .screen {
      flex: 1;
      display: none;
      padding: 16px 16px 100px;
      overflow-y: auto;
    }

    .screen.active {
      display: block;
    }

    .user-card {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 12px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-info {
      min-width: 0;
    }

    .user-name {
      font-size: 17px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-username {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }

    .title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
      margin-bottom: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .card-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 24px;
      font-weight: 700;
    }

    .center-area {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      min-height: 320px;
    }

    .coin-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .coin-shadow {
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,158,11,0.30) 0%, rgba(245,158,11,0.08) 45%, rgba(0,0,0,0) 70%);
      filter: blur(14px);
      animation: pulse 2s infinite ease-in-out;
    }

    .coin {
      width: 190px;
      height: 190px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      background:
        radial-gradient(circle at 30% 30%, #fde68a 0%, #fbbf24 35%, #f59e0b 70%, #b45309 100%);
      box-shadow:
        inset 0 8px 18px rgba(255,255,255,0.35),
        inset 0 -10px 18px rgba(0,0,0,0.2),
        0 14px 30px rgba(245,158,11,0.35);
      transform: scale(1);
      transition: transform 0.08s ease;
    }

    .coin:active {
      transform: scale(0.95);
    }

    .coin::before {
      content: "C";
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 72px;
      font-weight: 900;
      color: rgba(120, 53, 15, 0.88);
      text-shadow: 0 2px 0 rgba(255,255,255,0.2);
    }

    .floating {
      position: absolute;
      font-size: 28px;
      font-weight: 700;
      color: #fde68a;
      text-shadow: 0 0 12px rgba(245, 158, 11, 0.55);
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 10;
    }

    .progress-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      margin-top: 10px;
      margin-bottom: 14px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #22c55e, #86efac);
      border-radius: 999px;
      transition: width 0.2s linear;
    }

    .save-btn {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.28);
      margin-top: 10px;
    }

    .profile-box {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      margin-bottom: 14px;
    }

    .profile-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .profile-row:last-child {
      border-bottom: none;
    }

    .profile-label {
      color: var(--muted);
      font-size: 14px;
    }

    .profile-value {
      font-size: 14px;
      font-weight: 700;
      text-align: right;
      word-break: break-word;
    }

    .hint {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 78px;
      background: var(--nav);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 14px 18px;
    }

    .nav-btn {
      flex: 1;
      margin: 0 6px;
      height: 48px;
      border: none;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .nav-btn.active {
      background: linear-gradient(90deg, #2563eb, #3b82f6);
      box-shadow: 0 10px 22px rgba(37,99,235,0.25);
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-70px) scale(1.15);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.08); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="screen active" id="gameScreen">
      <div class="user-card">
        <div class="avatar" id="avatar">U</div>
        <div class="user-info">
          <div class="user-name" id="topUserName">Игрок</div>
          <div class="user-username" id="topUsername">@unknown</div>
        </div>
      </div>

      <div class="title">Coin Tap</div>
      <div class="subtitle">Жми по монете и зарабатывай баланс</div>

      <div class="stats">
        <div class="card">
          <div class="card-label">Баланс</div>
          <div class="card-value" id="balance">0</div>
        </div>
        <div class="card">
          <div class="card-label">Энергия</div>
          <div class="card-value"><span id="energy">100</span>/100</div>
        </div>
      </div>

      <div class="center-area" id="centerArea">
        <div class="coin-wrap">
          <div class="coin-shadow"></div>
          <button class="coin" id="coinBtn"></button>
        </div>
      </div>

      <div class="progress-card">
        <div class="progress-head">
          <span>Восстановление энергии</span>
          <span id="energyText">100/100</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <button class="save-btn" id="saveBtn">Сохранить результат</button>
      <div class="hint">Каждый тап = +1 к балансу</div>
    </div>

    <div class="screen" id="profileScreen">
      <div class="title">Профиль</div>
      <div class="subtitle">Аккаунт автоматически связан с Telegram</div>

      <div class="profile-box">
        <div class="profile-row">
          <div class="profile-label">Имя</div>
          <div class="profile-value" id="profileName">—</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">Username</div>
          <div class="profile-value" id="profileUsername">—</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">Telegram ID</div>
          <div class="profile-value" id="profileId">—</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">Баланс</div>
          <div class="profile-value" id="profileBalance">0</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">Энергия</div>
          <div class="profile-value" id="profileEnergy">100</div>
        </div>
      </div>

      <div class="profile-box">
        <div class="profile-row">
          <div class="profile-label">Статус</div>
          <div class="profile-value">Аккаунт привязан</div>
        </div>
        <div class="profile-row">
          <div class="profile-label">Источник</div>
          <div class="profile-value">Telegram Mini App</div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <button class="nav-btn active" id="gameTab">🎮 Игра</button>
      <button class="nav-btn" id="profileTab">👤 Профиль</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    let balance = Number(localStorage.getItem("coin_balance")) || 0;
    let energy = Number(localStorage.getItem("coin_energy")) || 100;
    const maxEnergy = 100;

    const tgUser = tg.initDataUnsafe?.user || null;

    const currentUser = {
      id: tgUser?.id || "Не определён",
      first_name: tgUser?.first_name || "Игрок",
      username: tgUser?.username ? "@" + tgUser.username : "@unknown"
    };

    const balanceEl = document.getElementById("balance");
    const energyEl = document.getElementById("energy");
    const energyTextEl = document.getElementById("energyText");
    const progressFill = document.getElementById("progressFill");
    const coinBtn = document.getElementById("coinBtn");
    const centerArea = document.getElementById("centerArea");
    const saveBtn = document.getElementById("saveBtn");

    const topUserName = document.getElementById("topUserName");
    const topUsername = document.getElementById("topUsername");
    const avatar = document.getElementById("avatar");

    const profileName = document.getElementById("profileName");
    const profileUsername = document.getElementById("profileUsername");
    const profileId = document.getElementById("profileId");
    const profileBalance = document.getElementById("profileBalance");
    const profileEnergy = document.getElementById("profileEnergy");

    const gameScreen = document.getElementById("gameScreen");
    const profileScreen = document.getElementById("profileScreen");
    const gameTab = document.getElementById("gameTab");
    const profileTab = document.getElementById("profileTab");

    function setUserInfo() {
      topUserName.textContent = currentUser.first_name;
      topUsername.textContent = currentUser.username;
      avatar.textContent = currentUser.first_name.charAt(0).toUpperCase();

      profileName.textContent = currentUser.first_name;
      profileUsername.textContent = currentUser.username;
      profileId.textContent = currentUser.id;
    }

    function render() {
      balanceEl.textContent = balance;
      energyEl.textContent = energy;
      energyTextEl.textContent = `${energy}/${maxEnergy}`;
      progressFill.style.width = `${(energy / maxEnergy) * 100}%`;

      profileBalance.textContent = balance;
      profileEnergy.textContent = energy;

      localStorage.setItem("coin_balance", balance);
      localStorage.setItem("coin_energy", energy);
    }

    function createFloatingText(x, y, text) {
      const el = document.createElement("div");
      el.className = "floating";
      el.textContent = text;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      centerArea.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 800);
    }

    function openGame() {
      gameScreen.classList.add("active");
      profileScreen.classList.remove("active");
      gameTab.classList.add("active");
      profileTab.classList.remove("active");
    }

    function openProfile() {
      profileScreen.classList.add("active");
      gameScreen.classList.remove("active");
      profileTab.classList.add("active");
      gameTab.classList.remove("active");
    }

    gameTab.addEventListener("click", openGame);
    profileTab.addEventListener("click", openProfile);

    coinBtn.addEventListener("click", (e) => {
      if (energy <= 0) return;

      balance += 1;
      energy -= 1;

      const rect = centerArea.getBoundingClientRect();
      const x = e.clientX - rect.left - 10;
      const y = e.clientY - rect.top - 20;

      createFloatingText(x, y, "+1");
      render();
    });

    setInterval(() => {
      if (energy < maxEnergy) {
        energy += 1;
        render();
      }
    }, 1000);

    saveBtn.addEventListener("click", () => {
      const data = {
        balance: balance,
        energy: energy,
        user_id: currentUser.id,
        first_name: currentUser.first_name,
        username: currentUser.username
      };

      tg.sendData(JSON.stringify(data));
    });

    setUserInfo();
    render();
  </script>
</body>
</html>
